services:
  - type: web
    name: coreinventory
    env: node
    plan: free
    region: oregon
    buildCommand: npm install --prefix backend && npm install --include=dev --prefix frontend && npm run build --prefix frontend
    startCommand: npm run start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_DIST_PATH
        value: ../frontend/dist
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SMTP_TIMEOUT_MS
        value: "15000"
      - key: SMTP_MAX_ATTEMPTS
        value: "2"
      - key: SIGNUP_OTP_TTL_MINUTES
        value: "10"
      - key: RESET_OTP_TTL_MINUTES
        value: "10"