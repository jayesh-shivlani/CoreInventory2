name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Frontend Lint
        run: npm run lint --prefix frontend

      - name: Frontend Build
        run: npm run build --prefix frontend

      - name: Backend Syntax Check
        run: |
          node --check backend/src/server.js
          node --check backend/src/db.js
          node --check backend/src/auth.js
          node --check backend/src/config.js
          node --check backend/src/services/emailService.js
          node --check backend/src/utils/withTimeout.js
          node --check backend/scripts/smoke-api.js
          node --check backend/scripts/apply-rls.js
          node --check backend/scripts/verify-role-approval.js

  smoke:
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.CI_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
      ADMIN_NAME: Core Inventory Admin
      EXPOSE_DEV_OTP: "true"
      STRICT_EMAIL_DOMAIN_CHECK: "false"
      SIGNUP_OTP_TTL_MINUTES: "10"
      RESET_OTP_TTL_MINUTES: "10"
      EMAIL_TIMEOUT_MS: "15000"
    steps:
      - name: Skip Smoke Tests When DB Secret Missing
        if: env.DATABASE_URL == ''
        run: echo "CI_DATABASE_URL is not set. Skipping backend smoke tests."

      - name: Checkout
        if: env.DATABASE_URL != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.DATABASE_URL != ''
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        if: env.DATABASE_URL != ''
        run: npm ci --prefix backend

      - name: Start Backend API
        if: env.DATABASE_URL != ''
        run: |
          nohup node backend/src/server.js > backend-smoke.log 2>&1 &
          echo $! > backend-smoke.pid

      - name: Wait for Backend Health
        if: env.DATABASE_URL != ''
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/api/health >/dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to become healthy"
          cat backend-smoke.log || true
          exit 1

      - name: Run Backend Smoke Tests
        if: env.DATABASE_URL != ''
        run: npm run test:smoke --prefix backend

      - name: Backend Logs on Failure
        if: failure() && env.DATABASE_URL != ''
        run: cat backend-smoke.log || true

      - name: Stop Backend API
        if: always() && env.DATABASE_URL != ''
        run: |
          if [ -f backend-smoke.pid ]; then
            kill "$(cat backend-smoke.pid)" || true
          fi
